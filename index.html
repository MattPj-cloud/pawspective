  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');
    body { font-family: 'Space Grotesk', sans-serif; }
    .glass-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 40px rgba(139,92,246,0.15);
    }
    .btn {
      background: rgba(255,255,255,0.06); backdrop-filter: blur(12px);
      border: 1px solid rgba(250,204,21,0.35); transition: all 0.25s ease;
    }
    .btn:hover:not(:disabled) {
      background: rgba(250,204,21,0.1); border-color: rgba(250,204,21,0.6);
      box-shadow: 0 0 20px rgba(250,204,21,0.1);
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .nav-btn.active { background: rgba(250,204,21,0.15); border-color: rgba(250,204,21,0.5); }
    .laser-line {
      position: absolute; left: 0; width: 100%; height: 3px;
      background: linear-gradient(90deg, transparent, #39ff14, transparent);
      box-shadow: 0 0 15px #39ff14; animation: scanLaser 0.75s ease-in-out infinite alternate; z-index: 10;
    }
    @keyframes scanLaser { 0% { top: 5%; } 100% { top: 90%; } }
    @keyframes jelloWobble {
      0% { transform: scale(1,1); } 15% { transform: scale(0.85,1.15); }
      30% { transform: scale(1.15,0.85); } 45% { transform: scale(0.92,1.08); }
      60% { transform: scale(1.06,0.94); } 100% { transform: scale(1,1); }
    }
    .jello { animation: jelloWobble 0.7s ease; }
    @keyframes rippleOut {
      0% { transform: translate(-50%,-50%) scale(0); opacity: 0.7; }
      100% { transform: translate(-50%,-50%) scale(4); opacity: 0; }
    }
    .ripple {
      position: absolute; width: 60px; height: 60px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,248,220,0.8), rgba(255,215,0,0.3), transparent);
      pointer-events: none; z-index: 20; animation: rippleOut 0.7s ease-out forwards;
    }
    .nose-btn {
      position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%);
      z-index: 15; cursor: pointer; transition: transform 0.15s ease;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
    }
    .nose-btn:hover { transform: translateX(-50%) scale(1.1); }
    .nose-btn:active { transform: translateX(-50%) scale(0.9); }
    @keyframes noseWiggle {
      0% { transform: translateX(-50%) rotate(0); }
      20% { transform: translateX(-50%) rotate(-8deg) scale(1.1); }
      40% { transform: translateX(-50%) rotate(8deg) scale(1.1); }
      100% { transform: translateX(-50%) rotate(0); }
    }
    .nose-wiggle { animation: noseWiggle 0.5s ease; }
    .bio-scan-overlay {
      position: absolute; inset: 0; z-index: 25; background: rgba(0,0,0,0.6);
      display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none;
    }
    @keyframes bioScanPulse { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }

    @keyframes verifiedPop {
      0% { transform: scale(0) rotate(-20deg); opacity: 0; }

    .scan-laser {

      background: linear-gradient(90deg, transparent, #facc15, transparent);
      box-shadow: 0 0 20px rgba(250,204,21,0.6); animation: scanBreedLaser 1.5s ease-in-out infinite; z-index: 10;
    }
    @keyframes scanBreedLaser { 0% { top: 5%; } 50% { top: 90%; } 100% { top: 5%; } }
    @keyframes scanPulseRing {
      0% { transform: scale(0.8); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 0.4; }
      100% { transform: scale(0.8); opacity: 0.8; }
    }
    .scan-pulse-ring { animation: scanPulseRing 1.5s ease-in-out infinite; }

    .walk-map .leaflet-control-zoom { margin-top: 10px !important; margin-right: 10px !important; }
    .walk-map .leaflet-control-zoom a { background: rgba(10,14,39,0.85) !important; color: #facc15 !important; border-color: rgba(250,204,21,0.3) !important; }

ge sled dogs but bred down to toy size.",poodle:"The second most intelligent breed, originally for duck hunting.",pug:"Chinese emperors kept Pugs as lapdogs in luxury.",retriever:"Have 'soft mouths' — can carry game without damaging it.",ridgeback:"Rhodesian Ridgebacks were bred to corner lions in Africa.",rottweiler:"Descended from Roman drover dogs that marched with legions.",samoyed:"Their perpetual 'smile' prevents drooling and icicle formation.",schnauzer:"Their distinctive beard protects from rodent bites.",setter:"English Setters 'set' (crouch) when they find game birds.",sheepdog:"Old English Sheepdogs were tax-exempt if tails were docked.",shiba:"The most popular companion dog in Japan, known for the 'Shiba scream.'",shihtzu:"Name means 'lion dog' in Chinese.",spaniel:"Originated in Spain ('Spaniel' = 'Spanish dog').",stbernard:"Rescued over 2,000 people in the Swiss Alps.",terrier:"The name comes from 'terra' (earth) — bred to dig.",vizsla:"Called 'Velcro dogs' — they never leave your side.",weimaraner:"Known as the 'Gray Ghost' for their sleek silver coat.",whippet:"The fastest domesticated animal of their weight — up to 35 mph.",wolfhound:"Irish Wolfhounds are the tallest of all dog breeds.",

        {label:"Apartment 🏢",value:"small"},{label:"House with Garden 🏡",value:"medium"},{label:"Farm / Big Property 🌾",value:"large"}]},
      { q:"Who's in your household?", emoji:"👨‍👩‍👧", multi:true, key:"family", options:[
        {label:"Just me 🧍",value:"solo"},{label:"Young kids 👶",value:"kids"},{label:"Older kids / teens 🧑‍🎓",value:"teens"},{label:"Other dogs 🐕",value:"dogs"},{label:"Cats 🐱",value:"cats"}]},
      { q:"How much grooming?", emoji:"✂️", multi:false, key:"grooming", options:[
        {label:"Minimal please 😅",value:"low"},{label:"Some brushing 🪮",value:"medium"},{label:"Full salon 💅",value:"high"}]},
      { q:"What size dog?", emoji:"📏", multi:true, key:"size", options:[
        {label:"Tiny 🐭",value:"small"},{label:"Medium 🐕",value:"medium"},{label:"Absolute Unit 🐻",value:"large"}]},
      { q:"Your climate?", emoji:"🌡️", multi:false, key:"climate", options:[
        {label:"Cold & snowy ❄️",value:"cold"},{label:"Mild & temperate 🌤️",value:"mild"},{label:"Hot & sunny ☀️",value:"hot"}]},
      { q:"Dog experience?", emoji:"🐣", multi:false, key:"experience", options:[
        {label:"Total newbie 🐣",value:"beginner"},{label:"Had dogs before 🐕",value:"some"},{label:"Dog whisperer 🧙",value:"expert"}]},
      { q:"What matters most?", emoji:"💖", multi:true, key:"priorities", options:[
        {label:"Loyalty 🛡️",value:"loyal"},{label:"Playfulness 🎾",value:"playful"},{label:"Calm & cuddly 🧸",value:"calm"},{label:"Smart 🧠",value:"smart"},{label:"Social 🤝",value:"social"}]},
      { q:"Barking tolerance?", emoji:"🔊", multi:false, key:"noise", options:[
        {label:"Silent ninja 🤫",value:"quiet"},{label:"Some barking 🐕",value:"some"},{label:"Let them sing 🎤",value:"loud"}]},
      { q:"Allergy concerns?", emoji:"🤧", multi:false, key:"allergy", options:[
        {label:"Need hypoallergenic 🤧",value:"yes"},{label:"Bring on the fur 🐻",value:"no"}]},
    ];

    const BREED_MATCHES = [
      {breed:"labrador",tags:{activity:"high",space:"medium",family:["kids","teens","dogs"],grooming:"low",size:"large",climate:"mild",experience:"beginner",priorities:["loyal","playful","social"],noise:"some",allergy:"no"},desc:"Loyal, friendly, and great with families. The ultimate all-rounder."},
      {breed:"golden",tags:{activity:"high",space:"medium",family:["kids","teens","dogs"],grooming:"medium",size:"large",climate:"mild",experience:"beginner",priorities:["loyal","calm","social"],noise:"some",allergy:"no"},desc:"Gentle, smart, and endlessly patient. A golden heart."},
      {breed:"corgi",tags:{activity:"medium",space:"small",family:["kids","teens"],grooming:"medium",size:"medium",climate:"mild",experience:"some",priorities:["playful","smart"],noise:"loud",allergy:"no"},desc:"Big personality in a small package. Royal approved."},
      {breed:"bulldog",tags:{activity:"low",space:"small",family:["kids","solo"],grooming:"low",size:"medium",climate:"mild",experience:"beginner",priorities:["calm","loyal"],noise:"quiet",allergy:"no"},desc:"Chill, lovable, perfectly happy on the couch."},
      {breed:"poodle",tags:{activity:"medium",space:"medium",family:["kids","cats"],grooming:"high",size:"medium",climate:"mild",experience:"some",priorities:["smart","social"],noise:"some",allergy:"yes"},desc:"Hypoallergenic, brilliant, and surprisingly athletic."},
      {breed:"beagle",tags:{activity:"high",space:"medium",family:["kids","dogs"],grooming:"low",size:"medium",climate:"mild",experience:"some",priorities:["playful","social"],noise:"loud",allergy:"no"},desc:"Curious nose on legs. Always up for adventure."},
      {breed:"chihuahua",tags:{activity:"low",space:"small",family:["solo"],grooming:"low",size:"small",climate:"hot",experience:"some",priorities:["loyal","calm"],noise:"loud",allergy:"no"},desc:"Tiny but fierce. Pocket-sized with big attitude."},
      {breed:"husky",tags:{activity:"high",space:"large",family:["teens","dogs"],grooming:"high",size:"large",climate:"cold",experience:"expert",priorities:["playful","smart"],noise:"loud",allergy:"no"},desc:"Energetic, vocal, and stunningly beautiful."},
      {breed:"pomeranian",tags:{activity:"low",space:"small",family:["solo"],grooming:"high",size:"small",climate:"mild",experience:"beginner",priorities:["playful","social"],noise:"loud",allergy:"no"},desc:"A fluffy little cloud with a bold personality."},
      {breed:"germanshepherd",tags:{activity:"high",space:"large",family:["kids","teens"],grooming:"medium",size:"large",climate:"mild",experience:"expert",priorities:["loyal","smart"],noise:"some",allergy:"no"},desc:"Smart, protective, and incredibly loyal."},
      {breed:"dachshund",tags:{activity:"medium",space:"small",family:["solo","teens"],grooming:"low",size:"small",climate:"mild",experience:"some",priorities:["playful","loyal"],noise:"some",allergy:"no"},desc:"Brave little sausage dog. Stubborn but irresistible."},
      {breed:"shiba",tags:{activity:"medium",space:"small",family:["solo"],grooming:"medium",size:"medium",climate:"cold",experience:"expert",priorities:["smart","calm"],noise:"quiet",allergy:"no"},desc:"Independent, clean, and full of memes. Much wow."},
      {breed:"boxer",tags:{activity:"high",space:"medium",family:["kids","teens","dogs"],grooming:"low",size:"large",climate:"mild",experience:"some",priorities:["playful","loyal","social"],noise:"some",allergy:"no"},desc:"Playful goofball that never grows up."},
      {breed:"maltese",tags:{activity:"low",space:"small",family:["solo","cats"],grooming:"high",size:"small",climate:"hot",experience:"beginner",priorities:["calm","social"],noise:"some",allergy:"yes"},desc:"Elegant lap dog that lives for cuddles."},

    ];

    // ── HELPERS ──
    function extractBreed(url) {
      var parts = url.split('/'); var idx = parts.indexOf('breeds');
      if (idx !== -1 && parts[idx+1]) return parts[idx+1].replace('-',' ');
      return 'mystery pup';
    }
    function getBreedFact(breed) {
      var key = breed.replace(/\s+/g,'').toLowerCase();
      if (BREED_FACTS[key]) return BREED_FACTS[key];
      var first = key.split(' ')[0];
      return BREED_FACTS[first] || "Every dog is a good dog.";
    }
    function playSparkle() {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        [523.25,659.25,783.99,1046.5,1318.5].forEach(function(freq,i) {
          var osc = ctx.createOscillator(); var gain = ctx.createGain();
          osc.type='sine'; osc.frequency.setValueAtTime(freq,ctx.currentTime+i*0.08);
          gain.gain.setValueAtTime(0.15,ctx.currentTime+i*0.08);
          gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.08+0.5);
          osc.connect(gain); gain.connect(ctx.destination);
          osc.start(ctx.currentTime+i*0.08); osc.stop(ctx.currentTime+i*0.08+0.5);
        });
        setTimeout(function(){ctx.close();},2000);
      } catch(e){}
    }
    function doConfetti(opts) {
      try {
        var shapes = (opts.emojis||['🦴']).map(function(t){return confetti.shapeFromText({text:t,scalar:2});});
        confetti(Object.assign({},{shapes:shapes,scalar:2},opts));
      } catch(e) {
        confetti(Object.assign({},{colors:['#ffd700','#a78bfa','#f472b6']},opts));
      }
    }
    function matchBreed(answers) {
      var maxScore = QUIZ_QUESTIONS.length * 2;
      var scored = BREED_MATCHES.map(function(b) {
        var score = 0;
        QUIZ_QUESTIONS.forEach(function(q,i) {
          var a = answers[i], bv = b.tags[q.key];
          if (Array.isArray(a) && Array.isArray(bv)) {
            var ov = a.filter(function(x){return bv.indexOf(x)!==-1;});
            if (ov.length>0) score += Math.min(2,ov.length);
          } else if (Array.isArray(a)) { if (a.indexOf(bv)!==-1) score+=2; }
          else if (Array.isArray(bv)) { if (bv.indexOf(a)!==-1) score+=2; }
          else { if (a===bv) score+=2; }
        });
        return {breed:b.breed,desc:b.desc,score:score,pct:Math.round((score/maxScore)*100)};
      });
      scored.sort(function(a,b){return b.score-a.score;});
      return scored.slice(0,3);
    }
    function getRank(c) { return c<=10?"Good Boy":c<=30?"Angelic Pupper":"The Bringer of Barkness"; }

    // ── PUZZLE HELPERS ──
    function shuffleArray(arr) {
      var a = arr.slice();
      for (var i=a.length-1;i>0;i--) { var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; }
      return a;
    }
    function isSolved(tiles) {
      for (var i=0;i<tiles.length;i++) { if (tiles[i]!==i) return false; }
      return true;
    }

    // ── ENCYCLOPEDIA: loaded from API ──

    // ── COMPONENTS ──
    function TypingText({text}) {
      var ref = useState, s = ref(''), d = ref(false);
      var displayed = s[0], setD = s[1], done = d[0], setDone = d[1];
      useEffect(function(){setD('');setDone(false);var i=0;var iv=setInterval(function(){i++;setD(text.slice(0,i));if(i>=text.length){clearInterval(iv);setDone(true);}},40);return function(){clearInterval(iv);};},[text]);
      return React.createElement('span',{className:'inline'},displayed,!done&&React.createElement('span',{className:'inline-block w-0.5 h-5 bg-purple-400 ml-0.5 animate-pulse align-middle'}));
    }

    // ── MAIN APP ──
    function App() {
      // Navigation
      var [page, setPage] = useState('home');

      // Rate Pups state
      var [dogUrl, setDogUrl] = useState(null);
      var [breed, setBreed] = useState('');
      var [breedFact, setBreedFact] = useState('');

      var [uploadedUrl, setUploadedUrl] = useState(null);
      var [isUserDog, setIsUserDog] = useState(false);
      var [bioScanning, setBioScanning] = useState(false);
      var [bioPhase, setBioPhase] = useState('');
      var [verified, setVerified] = useState(false);
      var [favorites, setFavorites] = useState(function(){try{return JSON.parse(localStorage.getItem('paws-favs')||'[]');}catch(e){return[];}});
      var [showFavs, setShowFavs] = useState(false);
      var [favTab, setFavTab] = useState('pics');
      var [gifUrl, setGifUrl] = useState(null);
      var [gifLoading, setGifLoading] = useState(false);
      var [gifFavorites, setGifFavorites] = useState(function(){try{return JSON.parse(localStorage.getItem('paws-gif-favs')||'[]');}catch(e){return[];}});
      var containerRef = useRef(null);
      var fileInputRef = useRef(null);

      // Quiz state
      var [quizStep, setQuizStep] = useState(0);
      var [quizAnswers, setQuizAnswers] = useState([]);
      var [quizMultiSelected, setQuizMultiSelected] = useState([]);
      var [quizResult, setQuizResult] = useState(null);
      var [quizDogImgs, setQuizDogImgs] = useState({});

      // Puzzle state
      var [puzzleImg, setPuzzleImg] = useState(null);
      var [puzzleTiles, setPuzzleTiles] = useState(null);
      var [puzzleSelected, setPuzzleSelected] = useState(null);
      var [puzzleMoves, setPuzzleMoves] = useState(0);
      var [puzzleSolved, setPuzzleSolved] = useState(false);
      var [puzzleLoading, setPuzzleLoading] = useState(false);

            if(Math.random()<0.2){final=[final[0],final[0],final[0]];}
            // 30% chance of pair
            else if(Math.random()<0.3){final=[final[0],final[0],final[2]];}
            setSlotBreeds(final);
            setSlotReels([SLOT_EMOJIS[Math.floor(Math.random()*SLOT_EMOJIS.length)],SLOT_EMOJIS[Math.floor(Math.random()*SLOT_EMOJIS.length)],SLOT_EMOJIS[Math.floor(Math.random()*SLOT_EMOJIS.length)]]);
            setSlotSpinning(false);
            if(final[0]===final[1]&&final[1]===final[2]){setSlotResult('jackpot');setSlotWins(slotWins+3);playSparkle();doConfetti({particleCount:100,spread:140,origin:{y:0.3},emojis:['🎰','🦴','🎉']});}
            else if(final[0]===final[1]||final[1]===final[2]||final[0]===final[2]){setSlotResult('pair');setSlotWins(slotWins+1);playSparkle();}
            else{setSlotResult('miss');}
          }
        },100);
      }

      // Trivia state
      var TRIVIA_QUESTIONS = Object.keys(BREED_FACTS).map(function(breed){
        var fact=BREED_FACTS[breed];
        var others=Object.keys(BREED_FACTS).filter(function(b){return b!==breed;});
        var wrong=shuffleArray(others).slice(0,3);
        var options=shuffleArray([breed].concat(wrong));
        return {fact:fact,answer:breed,options:options};
      });
      var [triviaIdx, setTriviaIdx] = useState(0);
      var [triviaScore, setTriviaScore] = useState(0);
      var [triviaTotal, setTriviaTotal] = useState(0);
      var [triviaAnswer, setTriviaAnswer] = useState(null);
      var [triviaQuestions, setTriviaQuestions] = useState(function(){return shuffleArray(TRIVIA_QUESTIONS).slice(0,10);});

      function answerTrivia(breed){
        if(triviaAnswer!==null)return;
        setTriviaAnswer(breed);setTriviaTotal(triviaTotal+1);
        if(breed===triviaQuestions[triviaIdx].answer){setTriviaScore(triviaScore+1);playSparkle();}
      }
      function nextTrivia(){
        if(triviaIdx+1>=triviaQuestions.length){
          // Quiz over
          return;
        }
        setTriviaIdx(triviaIdx+1);setTriviaAnswer(null);
      }
      function resetTrivia(){setTriviaIdx(0);setTriviaScore(0);setTriviaTotal(0);setTriviaAnswer(null);setTriviaQuestions(shuffleArray(TRIVIA_QUESTIONS).slice(0,10));}

      // Scramble state
      var SCRAMBLE_BREEDS = Object.keys(BREED_FACTS);
      var [scrambleBreed, setScrambleBreed] = useState(null);
      var [scrambleImg, setScrambleImg] = useState(null);
      var [scrambleLetters, setScrambleLetters] = useState('');
      var [scrambleGuess, setScrambleGuess] = useState('');
      var [scrambleResult, setScrambleResult] = useState(null);
      var [scrambleScore, setScrambleScore] = useState(0);
      var [scrambleHint, setScrambleHint] = useState(false);

      function startScramble(){
        var b=SCRAMBLE_BREEDS[Math.floor(Math.random()*SCRAMBLE_BREEDS.length)];
        setScrambleBreed(b);setScrambleGuess('');setScrambleResult(null);setScrambleHint(false);setScrambleImg(null);
        var letters=shuffleArray(b.split('')).join('');
        while(letters===b){letters=shuffleArray(b.split('')).join('');}
        setScrambleLetters(letters);
        fetch('https://dog.ceo/api/breed/'+b+'/images/random').then(function(r){return r.json();}).then(function(data){
          if(data.status==='success')setScrambleImg(data.message);
        }).catch(function(){});
      }
      function checkScramble(){
        if(scrambleGuess.toLowerCase().trim()===scrambleBreed){setScrambleResult('correct');setScrambleScore(scrambleScore+1);playSparkle();doConfetti({particleCount:60,spread:100,origin:{y:0.3},emojis:['🐾','🎉']});}
        else{setScrambleResult('wrong');}
      }

      // Games sub-page
      var [gamePage, setGamePage] = useState(null);

      // Pixel Art state
      var PIXEL_GRID = 8;
      var [pixelImg, setPixelImg] = useState(null);
      var [pixelBreed, setPixelBreed] = useState('');
      var [pixelRevealed, setPixelRevealed] = useState([]);
      var [pixelDone, setPixelDone] = useState(false);
      var [pixelGuess, setPixelGuess] = useState('');
      var [pixelGuessResult, setPixelGuessResult] = useState(null);
      var [pixelLoading, setPixelLoading] = useState(false);
      var [pixelHint, setPixelHint] = useState(false);
      var pixelTotal = PIXEL_GRID * PIXEL_GRID;
      var pixelRevealedCount = pixelRevealed.filter(function(r){return r;}).length;

      function startPixelArt(){
        setPixelLoading(true);setPixelDone(false);setPixelGuess('');setPixelGuessResult(null);setPixelHint(false);
        setPixelRevealed(new Array(PIXEL_GRID*PIXEL_GRID).fill(false));
        fetch('https://dog.ceo/api/breeds/image/random').then(function(r){return r.json();}).then(function(data){
          if(data.status==='success'){
            setPixelImg(data.message);
            setPixelBreed(extractBreed(data.message));
          }
        }).catch(function(e){console.error(e);}).finally(function(){setPixelLoading(false);});
      }
      function revealPixel(idx){
        if(pixelDone||pixelRevealed[idx])return;
        var newR=pixelRevealed.slice();newR[idx]=true;setPixelRevealed(newR);
        var count=newR.filter(function(r){return r;}).length;
        if(count>=pixelTotal){setPixelDone(true);playSparkle();doConfetti({particleCount:60,spread:100,origin:{y:0.3},emojis:['🎨','🐾']});}
      }
      function revealRandom5(){
        if(pixelDone)return;
        var hidden=[];pixelRevealed.forEach(function(r,i){if(!r)hidden.push(i);});
        var toReveal=shuffleArray(hidden).slice(0,5);
        var newR=pixelRevealed.slice();toReveal.forEach(function(i){newR[i]=true;});setPixelRevealed(newR);
        var count=newR.filter(function(r){return r;}).length;
        if(count>=pixelTotal){setPixelDone(true);playSparkle();doConfetti({particleCount:60,spread:100,origin:{y:0.3},emojis:['🎨','🐾']});}
      }
      function checkPixelGuess(){
        if(pixelGuess.toLowerCase().trim()===pixelBreed.toLowerCase().trim()){
          setPixelGuessResult('correct');setPixelDone(true);setPixelRevealed(new Array(pixelTotal).fill(true));
          playSparkle();doConfetti({particleCount:80,spread:120,origin:{y:0.3},emojis:['🎨','🐾','🎉']});
        } else { setPixelGuessResult('wrong'); }
      }

      function selectEncBreed(b){
        setEncBreed(b);setEncImg(null);
        var apiPath=b.indexOf('/')!==-1?'breed/'+b.split('/')[0]+'/'+b.split('/')[1]:'breed/'+b;
        fetch('https://dog.ceo/api/'+apiPath+'/images/random').then(function(r){return r.json();}).then(function(data){
          if(data.status==='success')setEncImg(data.message);
        }).catch(function(){});
      }
      var filteredBreeds = allBreeds.filter(function(b){return b.replace('/',' ').toLowerCase().indexOf(encSearch.toLowerCase())!==-1;});

      // ── NAV ──
      var NAV = [
        {id:'home',label:'🐕 Rate',emoji:'🐕'},
        {id:'scan',label:'📸 Scan',emoji:'📸'},
        {id:'walks',label:'🗺️ Walks',emoji:'🗺️'},
        {id:'match',label:'🔮 Match',emoji:'🔮'},
        {id:'games',label:'🎮 Games',emoji:'🎮'},
        {id:'breeds',label:'📖 Breeds',emoji:'📖'},
        {id:'favs',label:'❤️ Favs',emoji:'❤️'},
      ];

      // ── RENDER ──
      return (
        <div className="w-full max-w-md mx-auto pb-4">
          {/* Header */}
          <div className="text-center mb-4 pt-2">
            <h1 className="text-2xl font-bold text-white tracking-tight">🐾 Pawspective</h1>
            <p className="text-yellow-300/60 text-xs">✨ Divine Edition ✨</p>
          </div>

          {/* ═══ NAV BAR ═══ */}
          <div className="bg-white/5 backdrop-blur-lg border border-white/10 rounded-2xl px-2 py-2 mb-4">
            <div className="flex justify-around">
              {NAV.map(function(n){
                return <button key={n.id} onClick={function(){setPage(n.id);}} className={'nav-btn flex flex-col items-center gap-0.5 px-3 py-1 rounded-xl border border-transparent text-xs '+(page===n.id?'active text-yellow-300 border-yellow-500/30':'text-white/40 hover:text-white/60')}>
                  <span className="text-lg">{n.emoji}</span>
                  <span className="text-[10px]">{n.label.split(' ')[1]}</span>
                </button>;
              })}
            </div>
          </div>

          {/* ═══ RATE PUPS PAGE ═══ */}
          {page==='home' && (
            <div className="glass-card rounded-3xl p-5">
              {displayBreed && !loading && (
                <div className="text-center mb-3">
                  <span className="inline-block px-3 py-1 rounded-full text-xs font-medium bg-yellow-500/15 text-yellow-300 border border-yellow-500/30 capitalize">🐕 {displayBreed}</span>
                  {displayFact && <p className="text-purple-300/60 text-xs mt-1.5 italic">📖 {displayFact}</p>}
                </div>
              )}
              <div ref={containerRef} className="relative w-60 h-60 mx-auto rounded-2xl overflow-visible bg-deepblue/50 mb-4 select-none">
                <div className="w-full h-full rounded-2xl overflow-hidden">
                  {loading ? (
                    <div className="flex items-center justify-center h-full"><div className="w-10 h-10 border-4 border-purple-500/30 border-t-purple-400 rounded-full animate-spin"/></div>
                  ) : (
                    <>
                      <img src={displayUrl} alt={displayBreed} className={"w-full h-full object-cover "+(wobbling?'jello':'')} />
                      {scanning && <div className="laser-line"/>}
                      {bioScanning && <div className="bio-scan-overlay rounded-2xl"><div className="laser-line"/><p className="bio-scan-text text-green-400 text-sm font-medium">🧬 {bioPhase}</p></div>}
                      {isUserDog && verified && !bioScanning && <div className="absolute top-2 right-2 z-20 verified-badge flex items-center gap-1 px-2 py-0.5 rounded-full bg-green-500/20 border border-green-400/40 text-green-300 text-[10px] font-semibold">✓ Verified Good Boy</div>}
                      {ripples.map(function(r){return <div key={r.id} className="ripple" style={{left:r.x,top:r.y}}/>;})}
                      {!bioScanning && <button onClick={function(e){e.stopPropagation();toggleFavorite();}} className="absolute top-2 left-2 z-20 p-1.5 rounded-full bg-black/40 hover:bg-black/60 transition-all" aria-label="Favorite">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill={isFaved?"#f43f5e":"none"} stroke={isFaved?"#f43f5e":"white"} strokeWidth="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                      </button>}
                    </>
                  )}
                </div>
                {!loading && !bioScanning && (
                  <button onClick={handleNoseBoop} className={"nose-btn "+(noseWiggle?'nose-wiggle':'')} aria-label="Boop the snoot" title="BOOP!">
                    <svg width="50" height="40" viewBox="0 0 56 44" fill="none"><ellipse cx="28" cy="20" rx="24" ry="18" fill="#1a1a2e" stroke="#2d2d4e" strokeWidth="2"/><ellipse cx="28" cy="18" rx="20" ry="14" fill="#2a2a3e"/><ellipse cx="20" cy="13" rx="6" ry="4" fill="#4a4a6e" opacity="0.7"/><ellipse cx="19" cy="21" rx="5" ry="4" fill="#111128"/><ellipse cx="37" cy="21" rx="5" ry="4" fill="#111128"/><path d="M28 28L28 38" stroke="#2a2a3e" strokeWidth="2" strokeLinecap="round"/><path d="M28 38Q18 42 12 36" stroke="#2a2a3e" strokeWidth="2" strokeLinecap="round" fill="none"/><path d="M28 38Q38 42 44 36" stroke="#2a2a3e" strokeWidth="2" strokeLinecap="round" fill="none"/></svg>
                    <span className="absolute -bottom-4 left-1/2 -translate-x-1/2 text-[9px] text-yellow-300/50 whitespace-nowrap">boop the snoot</span>
                  </button>
                )}
              </div>
              {scanning && <p className="text-center text-green-400 text-sm mb-3 animate-pulse">🔬 Scanning Snoot...</p>}
              {thought && !scanning && <div className="bg-white/5 border border-purple-500/20 rounded-xl p-3 mb-3 text-center"><p className="text-xs text-purple-400 mb-1">💭 Deep Thought</p><p className="text-white text-sm italic">"<TypingText text={thought}/>"</p></div>}
              <div className="text-center mb-4">
                <p className="text-xs text-yellow-300/40">Goodness Score: {boopCount}</p>
                <p className="text-base font-semibold text-yellow-300">{getRank(boopCount)}</p>
              </div>
              <input ref={fileInputRef} type="file" accept="image/*" onChange={handleFileUpload} className="hidden"/>
              <div className="flex gap-2 mb-2">
                <button onClick={handleTranslate} disabled={scanning||loading||bioScanning} className="btn flex-1 flex items-center justify-center gap-1.5 px-3 py-2 rounded-xl text-xs font-medium text-yellow-200">🔬 Translate</button>
                <button onClick={function(){fileInputRef.current&&fileInputRef.current.click();}} disabled={loading||bioScanning} className="btn flex-1 flex items-center justify-center gap-1.5 px-3 py-2 rounded-xl text-xs font-medium text-yellow-200">📷 Scan My Dog</button>
              </div>
              <div className="flex gap-2 mb-2">
                <button onClick={handleSummon} disabled={loading} className="btn flex-1 flex items-center justify-center gap-1.5 px-3 py-2 rounded-xl text-xs font-medium text-yellow-200">🔄 New Pup</button>
                <button onClick={fetchDogGif} disabled={gifLoading} className="btn flex-1 flex items-center justify-center gap-1.5 px-3 py-2 rounded-xl text-xs font-medium text-yellow-200">{gifLoading?'⏳...':'🎬 Watch a Pup'}</button>
              </div>
              {gifUrl && (
                <div className="mt-3 rounded-xl overflow-hidden relative">
                  <img src={gifUrl} alt="Dog gif" className="w-full rounded-xl" style={{maxHeight:'220px',objectFit:'contain'}}/>
                  <button onClick={function(){toggleGifFavorite();}} className="absolute top-2 left-2 p-1 rounded-full bg-black/40 hover:bg-black/60">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill={isGifFaved?"#f43f5e":"none"} stroke={isGifFaved?"#f43f5e":"white"} strokeWidth="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                  </button>
                  <button onClick={function(){setGifUrl(null);}} className="absolute top-2 right-2 p-1.5 rounded-full bg-black/40 hover:bg-black/60 text-white text-xs font-bold">✕</button>
                  <p className="text-center text-white/20 text-[8px] mt-1">Powered by Tenor</p>
                </div>
              )}
            </div>
          )}

          {/* ═══ BREED SCANNER PAGE ═══ */}
          {page==='scan' && (
            <div className="glass-card rounded-3xl p-5">
              <div className="text-center mb-4">
                <p className="text-xl font-bold text-white">📸 Breed Scanner</p>
                <p className="text-white/40 text-xs mt-1">Snap a photo of any dog and our AI will have a go at guessing the breed</p>
              </div>

              {!scanImageUrl ? (
                <div className="text-center">
                  <div className="w-48 h-48 mx-auto rounded-2xl bg-deepblue/50 border-2 border-dashed border-white/20 flex flex-col items-center justify-center mb-4">
                    <span className="text-5xl mb-2">🐕</span>
                    <p className="text-white/30 text-xs">Upload or take a photo</p>
                  </div>
                  <input ref={scanFileRef} type="file" accept="image/*" capture="environment" onChange={handleScanUpload} className="hidden"/>
                  <div className="flex gap-2">
                    <button onClick={function(){scanFileRef.current&&scanFileRef.current.click();}} className="btn flex-1 flex items-center justify-center gap-1.5 px-3 py-3 rounded-xl text-sm font-medium text-yellow-200">📷 Take Photo</button>
                    <button onClick={function(){
                      var inp=document.createElement('input');inp.type='file';inp.accept='image/*';
                      inp.onchange=handleScanUpload;inp.click();
                    }} className="btn flex-1 flex items-center justify-center gap-1.5 px-3 py-3 rounded-xl text-sm font-medium text-yellow-200">🖼️ Upload</button>
                  </div>
                  <p className="text-white/20 text-[10px] mt-3">Powered by TensorFlow.js — AI best guesses, not always paw-fect! 🐾</p>
                </div>
              ) : (
                <div>
                  {/* Scanned image */}
                  <div className="relative w-56 h-56 mx-auto rounded-2xl overflow-hidden mb-4">
                    <img ref={scanImgRef} src={scanImageUrl} alt="Scanned dog" className="w-full h-full object-cover"/>
                    {scanActive && (
                      <div className="absolute inset-0 bg-black/40 flex flex-col items-center justify-center">
                        <div className="scan-laser"/>
                        <div className="w-20 h-20 rounded-full border-4 border-yellow-400/50 scan-pulse-ring mb-2"/>
                        <p className="text-yellow-300 text-xs font-medium animate-pulse">{scanPhase}</p>
                      </div>
                    )}
                  </div>

                  {/* Results */}
                  {scanResults && (
                    <div className="mb-4">
                      <p className="text-center text-purple-300 text-xs mb-3">🧬 Best Guesses (AI-powered)</p>
                      {scanResults.map(function(result,idx){
                        var isTop=idx===0;
                        return (
                          <div key={idx} className={'rounded-xl p-3 mb-2 '+(isTop?'bg-yellow-500/10 border border-yellow-500/30':'bg-white/5 border border-white/10')}>
                            <div className="flex items-center justify-between mb-1.5">
                              <span className={'text-sm font-semibold capitalize '+(isTop?'text-yellow-300':'text-white/70')}>
                                {isTop?'🏆 ':''}{result.breed}
                              </span>
                              <span className={'text-xs font-bold px-2 py-0.5 rounded-full '+(
                                result.confidence>60?'bg-green-500/20 text-green-300':
                                result.confidence>30?'bg-yellow-500/20 text-yellow-300':
                                'bg-white/10 text-white/50'
                              )}>{result.confidence}%</span>
                            </div>
                            <div className="w-full bg-white/10 rounded-full h-1.5 mb-1.5">
                              <div className={'confidence-bar h-1.5 rounded-full '+(isTop?'bg-yellow-400':'bg-purple-400')} style={{width:result.confidence+'%'}}/>
                            </div>
                            {result.fact && <p className="text-purple-300/50 text-[10px] italic">📖 {result.fact}</p>}
                          </div>
                        );
                      })}
                    </div>
                  )}

                  {/* Actions */}
                  <div className="flex gap-2">
                    <button onClick={resetScan} className="btn flex-1 flex items-center justify-center gap-1.5 px-3 py-2.5 rounded-xl text-sm font-medium text-yellow-200">📸 Scan Another</button>
                    {scanResults && scanResults[0] && (
                      <button onClick={function(){
                        var b=scanResults[0].breed.replace(/\s+/g,'').toLowerCase();
                        var match=allBreeds.find(function(ab){return ab.replace('/','').toLowerCase().indexOf(b)!==-1;});
                        if(match){selectEncBreed(match);setPage('breeds');}
                        else{setEncSearch(scanResults[0].breed);setPage('breeds');}
                      }} className="btn flex-1 flex items-center justify-center gap-1.5 px-3 py-2.5 rounded-xl text-sm font-medium text-yellow-200">📖 Learn More</button>
                    )}
                  </div>
                </div>
              )}
            </div>
          )}

          {/* ═══ MATCH QUIZ PAGE ═══ */}
          {page==='match' && (
            <div className="glass-card rounded-3xl p-5">
              {!quizResult ? (
                <div>
                  <div className="text-center mb-4">
                    <p className="text-white/40 text-xs mb-1">Question {quizStep+1} of {QUIZ_QUESTIONS.length}</p>
                    <div className="w-full bg-white/10 rounded-full h-1.5 mb-3"><div className="bg-purple-400 h-1.5 rounded-full transition-all" style={{width:(quizStep/QUIZ_QUESTIONS.length*100)+'%'}}/></div>
                    <p className="text-2xl mb-1">{QUIZ_QUESTIONS[quizStep].emoji}</p>
                    <p className="text-white text-base font-medium">{QUIZ_QUESTIONS[quizStep].q}</p>
                    {QUIZ_QUESTIONS[quizStep].multi && <p className="text-purple-300/50 text-xs mt-1">Select all that apply</p>}
                  </div>
                  <div className="flex flex-col gap-2">
                    {QUIZ_QUESTIONS[quizStep].options.map(function(opt,i){
                      var isSel = QUIZ_QUESTIONS[quizStep].multi && quizMultiSelected.indexOf(opt.value)!==-1;
                      return <button key={i} onClick={function(){handleQuizAnswer(opt.value);}} className={'w-full px-3 py-2.5 rounded-xl text-sm font-medium transition-all '+(isSel?'bg-purple-500/30 text-purple-200 border border-purple-400/60':'btn text-yellow-200')}>{isSel?'✓ ':''}{opt.label}</button>;
                    })}
                  </div>
                  {QUIZ_QUESTIONS[quizStep].multi && <button onClick={handleMultiSubmit} disabled={quizMultiSelected.length===0} className="btn w-full mt-3 px-3 py-2 rounded-xl text-sm font-medium text-yellow-200">Next →</button>}
                </div>
              ) : (
                <div>
                  <p className="text-center text-purple-300 text-xs mb-3">🔮 Your Top 3 Matches</p>
                  {quizResult.map(function(match,idx){
                    var medals=['🥇','🥈','🥉'];
                    return (
                      <div key={idx} className={'rounded-2xl p-3 mb-3 '+(idx===0?'bg-yellow-500/10 border border-yellow-500/30':'bg-white/5 border border-white/10')}>
                        <div className="flex items-center justify-between mb-2">
                          <span className="text-base font-bold text-yellow-300 capitalize">{medals[idx]} {match.breed}</span>
                          <span className={'text-xs font-semibold px-2 py-0.5 rounded-full '+(idx===0?'bg-yellow-500/20 text-yellow-300':'bg-white/10 text-white/50')}>{match.pct}%</span>
                        </div>
                        {quizDogImgs[match.breed] && <div className="w-full h-36 rounded-xl overflow-hidden mb-2"><img src={quizDogImgs[match.breed]} alt={match.breed} className="w-full h-full object-cover"/></div>}
                        <p className="text-white/60 text-sm italic mb-1">"{match.desc}"</p>
                        {BREED_FACTS[match.breed] && <p className="text-purple-300/40 text-xs">📖 {BREED_FACTS[match.breed]}</p>}
                      </div>
                    );
                  })}
                  <button onClick={resetQuiz} className="btn w-full px-3 py-2 rounded-xl text-sm font-medium text-yellow-200 mt-1">🔄 Try Again</button>
                </div>
              )}
            </div>
          )}

          {/* ═══ GAMES HUB ═══ */}
          {page==='games' && !gamePage && (
            <div className="glass-card rounded-3xl p-5">
              <div className="text-center mb-4">
                <p className="text-xl font-bold text-white">🎮 Games</p>
                <p className="text-white/40 text-xs mt-1">Pick a game to play</p>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <button onClick={function(){setGamePage('puzzle');}} className="btn rounded-2xl p-4 text-center"><p className="text-3xl mb-1">🧩</p><p className="text-sm font-medium text-yellow-200">Jigsaw</p><p className="text-[10px] text-white/30">Swap tiles</p></button>
                <button onClick={function(){setGamePage('slots');}} className="btn rounded-2xl p-4 text-center"><p className="text-3xl mb-1">🎰</p><p className="text-sm font-medium text-yellow-200">Slots</p><p className="text-[10px] text-white/30">Match breeds</p></button>
                <button onClick={function(){setGamePage('trivia');resetTrivia();}} className="btn rounded-2xl p-4 text-center"><p className="text-3xl mb-1">📝</p><p className="text-sm font-medium text-yellow-200">Trivia</p><p className="text-[10px] text-white/30">Test your knowledge</p></button>
                <button onClick={function(){setGamePage('scramble');startScramble();}} className="btn rounded-2xl p-4 text-center"><p className="text-3xl mb-1">🔀</p><p className="text-sm font-medium text-yellow-200">Scramble</p><p className="text-[10px] text-white/30">Unscramble breeds</p></button>
                <button onClick={function(){setGamePage('pixel');startPixelArt();}} className="btn rounded-2xl p-4 text-center col-span-2"><p className="text-3xl mb-1">🎨</p><p className="text-sm font-medium text-yellow-200">Pixel Art</p><p className="text-[10px] text-white/30">Reveal the hidden dog</p></button>
              </div>
            </div>
          )}

          {/* ═══ JIGSAW GAME ═══ */}
          {page==='games' && gamePage==='puzzle' && (
            <div className="glass-card rounded-3xl p-5">
              <button onClick={function(){setGamePage(null);}} className="text-xs text-yellow-300/60 hover:text-yellow-300 mb-3 inline-block">← Back to Games</button>
              <div className="text-center mb-4">
                <p className="text-xl font-bold text-white">🧩 Dog Jigsaw</p>
                <p className="text-white/40 text-xs mt-1">Swap tiles to complete the picture</p>
              </div>
              {!puzzleTiles ? (
                <div className="text-center">
                  <button onClick={startPuzzle} disabled={puzzleLoading} className="btn px-6 py-3 rounded-xl text-sm font-medium text-yellow-200">{puzzleLoading?'⏳ Loading...':'🐕 Start Puzzle'}</button>
                </div>
              ) : (
                <div>
                  <div className="flex justify-between items-center mb-3">
                    <span className="text-xs text-white/40">Moves: {puzzleMoves}</span>
                    {puzzleSolved && <span className="text-xs text-green-400 font-semibold">🎉 Solved!</span>}
                    <button onClick={startPuzzle} className="text-xs text-yellow-300/60 hover:text-yellow-300">New Puzzle</button>
                  </div>
                  <div className="grid grid-cols-3 gap-1 mx-auto mb-3" style={{width:'252px',height:'252px'}}>
                    {puzzleTiles.map(function(tileIdx,pos){
                      var row=Math.floor(tileIdx/GRID);var col=tileIdx%GRID;
                      return (
                        <div key={pos} onClick={function(){handleTileClick(pos);}}
                          className={'puzzle-tile rounded-lg overflow-hidden '+(puzzleSelected===pos?'selected':'')}
                          style={{width:'82px',height:'82px',backgroundImage:'url('+puzzleImg+')',backgroundSize:'252px 252px',backgroundPosition:'-'+(col*84)+'px -'+(row*84)+'px'}}
                        />
                      );
                    })}
                  </div>
                  {puzzleSolved && (
                    <div className="text-center">
                      <div className="w-48 h-48 mx-auto rounded-xl overflow-hidden mb-2"><img src={puzzleImg} alt="Solved" className="w-full h-full object-cover"/></div>
                      <p className="text-yellow-300 text-sm font-medium">Completed in {puzzleMoves} moves!</p>
                    </div>
                  )}
                </div>
              )}
            </div>
          )}

          {/* ═══ SLOT MACHINE GAME ═══ */}
          {page==='games' && gamePage==='slots' && (
            <div className="glass-card rounded-3xl p-5">
              <button onClick={function(){setGamePage(null);}} className="text-xs text-yellow-300/60 hover:text-yellow-300 mb-3 inline-block">← Back to Games</button>
              <div className="text-center mb-4">
                <p className="text-xl font-bold text-white">🎰 Dog Slots</p>
                <p className="text-white/40 text-xs mt-1">Match 3 breeds for a jackpot!</p>
                <p className="text-yellow-300 text-xs mt-1">🦴 Wins: {slotWins}</p>
              </div>
              <div className="flex justify-center gap-3 mb-4">
                {slotReels.map(function(emoji,i){
                  return <div key={i} className={'w-24 h-28 rounded-2xl bg-deepblue/80 border border-white/10 flex flex-col items-center justify-center '+(slotSpinning?'animate-pulse':'')}>
                    <span className="text-3xl mb-1">{emoji}</span>
                    <span className="text-[10px] text-yellow-300/70 capitalize font-medium">{slotBreeds[i]}</span>
                  </div>;
                })}
              </div>
              {slotResult && !slotSpinning && (
                <div className="text-center mb-3">
                  {slotResult==='jackpot' && <p className="text-yellow-300 text-lg font-bold">🎉 JACKPOT! Triple {slotBreeds[0]}! +3 🦴</p>}
                  {slotResult==='pair' && <p className="text-green-400 text-sm font-medium">🐾 Nice! A pair! +1 🦴</p>}
                  {slotResult==='miss' && <p className="text-white/40 text-sm">No match. Try again!</p>}
                </div>
              )}
              <button onClick={spinSlots} disabled={slotSpinning} className="btn w-full px-4 py-3 rounded-xl text-sm font-medium text-yellow-200">{slotSpinning?'🎰 Spinning...':'🎰 SPIN!'}</button>
            </div>
          )}

          {/* ═══ TRIVIA GAME ═══ */}
          {page==='games' && gamePage==='trivia' && (
            <div className="glass-card rounded-3xl p-5">
              <button onClick={function(){setGamePage(null);}} className="text-xs text-yellow-300/60 hover:text-yellow-300 mb-3 inline-block">← Back to Games</button>
              <div className="text-center mb-4">
                <p className="text-xl font-bold text-white">📝 Dog Trivia</p>
                <p className="text-white/40 text-xs mt-1">Score: {triviaScore}/{triviaTotal}</p>
              </div>
              {triviaIdx < triviaQuestions.length ? (
                <div>
                  <div className="w-full bg-white/10 rounded-full h-1.5 mb-3"><div className="bg-purple-400 h-1.5 rounded-full transition-all" style={{width:((triviaIdx)/triviaQuestions.length*100)+'%'}}/></div>
                  <p className="text-xs text-white/40 mb-1">Question {triviaIdx+1} of {triviaQuestions.length}</p>
                  <div className="bg-white/5 border border-purple-500/20 rounded-xl p-3 mb-4">
                    <p className="text-white text-sm italic">"{triviaQuestions[triviaIdx].fact}"</p>
                    <p className="text-purple-300/60 text-xs mt-2">Which breed is this about?</p>
                  </div>
                  <div className="flex flex-col gap-2">
                    {triviaQuestions[triviaIdx].options.map(function(opt,i){
                      var isCorrect = opt===triviaQuestions[triviaIdx].answer;
                      var cls = 'w-full px-3 py-2.5 rounded-xl text-sm font-medium transition-all capitalize ';
                      if(triviaAnswer===null){cls+='btn text-yellow-200';}
                      else if(isCorrect){cls+='bg-green-500/20 text-green-300 border border-green-400/40';}
                      else if(opt===triviaAnswer){cls+='bg-red-500/20 text-red-300 border border-red-400/40';}
                      else{cls+='btn text-yellow-200 opacity-40';}
                      return <button key={i} onClick={function(){answerTrivia(opt);}} disabled={triviaAnswer!==null} className={cls}>{opt}</button>;
                    })}
                  </div>
                  {triviaAnswer!==null && (
                    <button onClick={nextTrivia} className="btn w-full mt-3 px-3 py-2 rounded-xl text-sm font-medium text-yellow-200">
                      {triviaIdx+1>=triviaQuestions.length?'See Results':'Next →'}
                    </button>
                  )}
                </div>
              ) : (
                <div className="text-center">
                  <p className="text-4xl mb-3">{triviaScore>=8?'🏆':triviaScore>=5?'🎉':'🐾'}</p>
                  <p className="text-yellow-300 text-lg font-bold mb-1">You scored {triviaScore}/{triviaQuestions.length}</p>
                  <p className="text-white/40 text-sm mb-4">{triviaScore>=8?'Dog expert!':triviaScore>=5?'Not bad!':'Keep learning!'}</p>
                  <button onClick={resetTrivia} className="btn w-full px-4 py-2.5 rounded-xl text-sm font-medium text-yellow-200">🔄 Play Again</button>
                </div>
              )}
            </div>
          )}

          {/* ═══ SCRAMBLE GAME ═══ */}
          {page==='games' && gamePage==='scramble' && (
            <div className="glass-card rounded-3xl p-5">
              <button onClick={function(){setGamePage(null);}} className="text-xs text-yellow-300/60 hover:text-yellow-300 mb-3 inline-block">← Back to Games</button>
              <div className="text-center mb-4">
                <p className="text-xl font-bold text-white">🔀 Breed Scramble</p>
                <p className="text-white/40 text-xs mt-1">Streak: {scrambleScore} 🔥</p>
              </div>
              {scrambleBreed ? (
                <div>
                  {scrambleImg && <div className="w-48 h-48 mx-auto rounded-2xl overflow-hidden mb-3"><img src={scrambleImg} alt="Mystery dog" className="w-full h-full object-cover"/></div>}
                  <div className="text-center mb-3">
                    <p className="text-2xl font-bold text-purple-300 tracking-widest uppercase mb-1">{scrambleLetters}</p>
                    {scrambleHint && <p className="text-xs text-yellow-300/50">Hint: starts with "{scrambleBreed[0].toUpperCase()}" and has {scrambleBreed.length} letters</p>}
                  </div>
                  {scrambleResult===null ? (
                    <div>
                      <input type="text" value={scrambleGuess} onChange={function(e){setScrambleGuess(e.target.value);}} onKeyDown={function(e){if(e.key==='Enter')checkScramble();}} placeholder="Type the breed name..." className="w-full px-3 py-2 rounded-xl bg-white/5 border border-white/10 text-white text-sm placeholder-white/30 mb-2 outline-none focus:border-yellow-500/40"/>
                      <div className="flex gap-2">
                        <button onClick={checkScramble} disabled={!scrambleGuess.trim()} className="btn flex-1 px-3 py-2 rounded-xl text-sm font-medium text-yellow-200">Check ✓</button>
                        <button onClick={function(){setScrambleHint(true);}} className="btn px-3 py-2 rounded-xl text-sm font-medium text-yellow-200">💡 Hint</button>
                      </div>
                    </div>
                  ) : (
                    <div className="text-center">
                      {scrambleResult==='correct' ? <p className="text-green-400 text-sm font-medium mb-2">🎉 Correct! It's {scrambleBreed}!</p> : <p className="text-red-400 text-sm font-medium mb-2">❌ Nope! It was <span className="capitalize text-yellow-300">{scrambleBreed}</span></p>}
                      <button onClick={startScramble} className="btn w-full px-3 py-2 rounded-xl text-sm font-medium text-yellow-200">Next Word →</button>
                    </div>
                  )}
                </div>
              ) : (
                <div className="text-center">
                  <button onClick={startScramble} className="btn px-6 py-3 rounded-xl text-sm font-medium text-yellow-200">🔀 Start Scramble</button>
                </div>
              )}
            </div>
          )}

          {/* ═══ PIXEL ART GAME ═══ */}
          {page==='games' && gamePage==='pixel' && (
            <div className="glass-card rounded-3xl p-5">
              <button onClick={function(){setGamePage(null);}} className="text-xs text-yellow-300/60 hover:text-yellow-300 mb-3 inline-block">← Back to Games</button>
              <div className="text-center mb-3">
                <p className="text-xl font-bold text-white">🎨 Pixel Reveal</p>
                <p className="text-white/40 text-xs mt-1">Tap tiles to reveal the hidden dog. Guess the breed!</p>
                <p className="text-yellow-300/50 text-xs mt-1">Revealed: {pixelRevealedCount}/{pixelTotal}</p>
              </div>
              {pixelLoading ? (
                <div className="flex items-center justify-center py-8"><div className="w-10 h-10 border-4 border-purple-500/30 border-t-purple-400 rounded-full animate-spin"/></div>
              ) : pixelImg ? (
                <div>
                  <div className="mx-auto mb-3 relative" style={{width:'256px',height:'256px'}}>
                    {pixelRevealed.map(function(revealed,idx){
                      var row=Math.floor(idx/PIXEL_GRID);var col=idx%PIXEL_GRID;
                      var cellSize=256/PIXEL_GRID;
                      return (
                        <div key={idx} onClick={function(){revealPixel(idx);}}
                          style={{position:'absolute',left:(col*cellSize)+'px',top:(row*cellSize)+'px',width:cellSize+'px',height:cellSize+'px',
                            backgroundImage:revealed?'url('+pixelImg+')':'none',
                            backgroundSize:'256px 256px',
                            backgroundPosition:'-'+(col*cellSize)+'px -'+(row*cellSize)+'px',
                            backgroundColor:revealed?'transparent':'#1a1a3e',
                            border:'1px solid rgba(255,255,255,0.08)',
                            cursor:revealed?'default':'pointer',
                            transition:'all 0.2s ease',
                          }}
                          className={!revealed?'hover:bg-purple-900/50':''}
                        />
                      );
                    })}
                  </div>
                  {!pixelDone && (
                    <div className="mb-3">
                      <div className="flex gap-2 mb-2">
                        <button onClick={revealRandom5} className="btn flex-1 px-3 py-2 rounded-xl text-xs font-medium text-yellow-200">✨ Reveal 5 Tiles</button>
                        <button onClick={function(){setPixelHint(true);}} className="btn flex-1 px-3 py-2 rounded-xl text-xs font-medium text-yellow-200">💡 Clue</button>
                        <button onClick={function(){setPixelRevealed(new Array(pixelTotal).fill(true));setPixelDone(true);}} className="btn flex-1 px-3 py-2 rounded-xl text-xs font-medium text-yellow-200" style={{borderColor:'rgba(239,68,68,0.3)'}}>🏳️ Give Up</button>
                      </div>
                      {pixelHint && <p className="text-yellow-300/60 text-xs text-center mb-2">💡 It starts with "{pixelBreed[0].toUpperCase()}", has {pixelBreed.length} letters, and is a {pixelBreed.length<=5?'short':'longer'} word</p>}
                      <div className="flex gap-2">
                        <input type="text" value={pixelGuess} onChange={function(e){setPixelGuess(e.target.value);}} onKeyDown={function(e){if(e.key==='Enter')checkPixelGuess();}} placeholder="Guess the breed..." className="flex-1 px-3 py-2 rounded-xl bg-white/5 border border-white/10 text-white text-sm placeholder-white/30 outline-none focus:border-yellow-500/40"/>
                        <button onClick={checkPixelGuess} disabled={!pixelGuess.trim()} className="btn px-4 py-2 rounded-xl text-xs font-medium text-yellow-200">Guess</button>
                      </div>
                      {pixelGuessResult==='wrong' && <p className="text-red-400 text-xs mt-1 text-center">Not quite! Keep revealing tiles.</p>}
                    </div>
                  )}
                  {pixelDone && (
                    <div className="text-center">
                      {pixelGuessResult==='correct' ? (
                        <p className="text-green-400 text-sm font-medium mb-2">🎉 You guessed it! It's a <span className="capitalize text-yellow-300">{pixelBreed}</span>!</p>
                      ) : (
                        <p className="text-yellow-300 text-sm font-medium mb-2">It's a <span className="capitalize">{pixelBreed}</span>!</p>
                      )}
                      <button onClick={startPixelArt} className="btn w-full px-3 py-2 rounded-xl text-sm font-medium text-yellow-200">🎨 New Picture</button>
                    </div>
                  )}
                </div>
              ) : (
                <div className="text-center"><button onClick={startPixelArt} className="btn px-6 py-3 rounded-xl text-sm font-medium text-yellow-200">🎨 Start</button></div>
              )}
            </div>
          )}

          {/* ═══ BREEDS ENCYCLOPEDIA PAGE ═══ */}
          {page==='breeds' && (
            <div className="glass-card rounded-3xl p-5">
              {!encBreed ? (
                <div>
                  <div className="text-center mb-4">
                    <p className="text-xl font-bold text-white">📖 Breed Encyclopedia</p>
                    <p className="text-white/40 text-xs mt-1">{allBreeds.length} breeds to explore</p>
                  </div>
                  <input type="text" value={encSearch} onChange={function(e){setEncSearch(e.target.value);}} placeholder="Search breeds..." className="w-full px-3 py-2 rounded-xl bg-white/5 border border-white/10 text-white text-sm placeholder-white/30 mb-3 outline-none focus:border-yellow-500/40"/>
                  <div className="max-h-80 overflow-y-auto pr-1" style={{scrollbarWidth:'thin',scrollbarColor:'rgba(250,204,21,0.3) transparent'}}>
                    {filteredBreeds.map(function(b){
                      var displayName = b.indexOf('/')!==-1 ? b.split('/')[1]+' '+b.split('/')[0] : b;
                      return (
                        <button key={b} onClick={function(){selectEncBreed(b);}} className="w-full text-left px-3 py-2 rounded-lg hover:bg-white/5 transition-all flex items-center justify-between group">
                          <span className="text-sm text-white/70 capitalize group-hover:text-yellow-300">{displayName}</span>
                          <span className="text-white/20 text-xs">→</span>
                        </button>
                      );
                    })}
                    {filteredBreeds.length===0 && <p className="text-center text-white/30 text-sm py-4">No breeds found</p>}
                  </div>
                </div>
              ) : (
                <div>
                  <button onClick={function(){setEncBreed(null);setEncImg(null);}} className="text-xs text-yellow-300/60 hover:text-yellow-300 mb-3 inline-block">← Back to breeds</button>
                  <div className="text-center">
                    {(function(){
                      var displayName = encBreed.indexOf('/')!==-1 ? encBreed.split('/')[1]+' '+encBreed.split('/')[0] : encBreed;
                      var factKey = encBreed.replace('/','').toLowerCase();
                      var fact = BREED_FACTS[factKey] || BREED_FACTS[encBreed.split('/')[0]] || "A wonderful dog breed!";
                      return (<>
                        <h2 className="text-xl font-bold text-yellow-300 capitalize mb-3">{displayName}</h2>
                        {encImg ? (
                          <div className="w-56 h-56 mx-auto rounded-2xl overflow-hidden mb-3"><img src={encImg} alt={displayName} className="w-full h-full object-cover"/></div>
                        ) : (
                          <div className="w-56 h-56 mx-auto rounded-2xl bg-deepblue/50 flex items-center justify-center mb-3"><div className="w-8 h-8 border-4 border-purple-500/30 border-t-purple-400 rounded-full animate-spin"/></div>
                        )}
                        <p className="text-white/60 text-sm italic mb-3">📖 {fact}</p>
                        <button onClick={function(){selectEncBreed(encBreed);}} className="btn px-4 py-2 rounded-xl text-xs font-medium text-yellow-200">🔄 New Photo</button>
                      </>);
                    })()}
                  </div>
                </div>
              )}
            </div>
          )}

          {/* ═══ DOG WALKS PAGE ═══ */}
          {page==='walks' && (
            <div className="glass-card rounded-3xl p-5">
              <div className="text-center mb-4">
                <p className="text-xl font-bold text-white">🗺️ Dog Walks</p>
                <p className="text-white/40 text-xs mt-1">Find parks and trails near you for walkies</p>
              </div>

              {/* Tab toggle: Map vs Saved */}
              <div className="flex gap-2 mb-4">
                <button onClick={function(){setWalkView('map');}} className={'flex-1 py-1.5 rounded-lg text-xs font-medium transition-all '+(walkView==='map'?'bg-yellow-500/20 text-yellow-300 border border-yellow-500/40':'bg-white/5 text-white/40 border border-white/10')}>🗺️ Nearby</button>
                <button onClick={function(){setWalkView('saved');}} className={'flex-1 py-1.5 rounded-lg text-xs font-medium transition-all '+(walkView==='saved'?'bg-purple-500/20 text-purple-300 border border-purple-500/40':'bg-white/5 text-white/40 border border-white/10')}>📌 Saved ({savedWalks.length})</button>
              </div>

              {walkView==='map' && (
                <div>
                  {!walkUserPos && !walkLoading && !walkError && (
                    <div className="text-center py-6">
                      <span className="text-5xl mb-3 block">🐕‍🦺</span>
                      <p className="text-white/50 text-sm mb-4">Find dog-friendly parks and walks near your location</p>
                      <button onClick={initWalkMap} className="btn px-6 py-3 rounded-xl text-sm font-medium text-yellow-200">📍 Find Walks Near Me</button>
                    </div>
                  )}

                  {walkLoading && !walkUserPos && (
                    <div className="text-center py-8">
                      <div className="w-10 h-10 border-4 border-purple-500/30 border-t-purple-400 rounded-full animate-spin mx-auto mb-3"/>
                      <p className="text-white/40 text-xs">Getting your location...</p>
                    </div>
                  )}

                  {walkError && (
                    <div className="text-center py-6">
                      <p className="text-red-400/80 text-sm mb-3">⚠️ {walkError}</p>
                      <button onClick={initWalkMap} className="btn px-4 py-2 rounded-xl text-xs font-medium text-yellow-200">🔄 Try Again</button>
                    </div>
                  )}

                  {walkUserPos && (
                    <div>
                      {/* Map container */}
                      <div ref={walkMapRef} className="walk-map w-full mb-3" style={{height:'280px'}}/>

                      {walkLoading && (
                        <div className="text-center py-3">
                          <div className="w-8 h-8 border-4 border-purple-500/30 border-t-purple-400 rounded-full animate-spin mx-auto mb-2"/>
                          <p className="text-white/40 text-xs">Sniffing out nearby parks...</p>
                        </div>
                      )}

                      {!walkLoading && walkPlaces.length===0 && !walkError && (
                        <p className="text-center text-white/30 text-xs py-3">No parks found nearby. Try a different area.</p>
                      )}

                      {/* Place list */}
                      {!walkLoading && walkPlaces.length>0 && (
                        <div>
                          <p className="text-white/40 text-[10px] mb-2">🌳 {walkPlaces.length} places found within 5km</p>
                          <div className="max-h-60 overflow-y-auto pr-1" style={{scrollbarWidth:'thin',scrollbarColor:'rgba(250,204,21,0.3) transparent'}}>
                            {walkPlaces.map(function(place){
                              var saved=isWalkSaved(place.id);
                              var isSelected=walkSelected&&walkSelected.id===place.id;
                              return (
                                <div key={place.id} onClick={function(){
                                  setWalkSelected(place);
                                  if(walkMapInstance.current){walkMapInstance.current.setView([place.lat,place.lon],15);}
                                }} className={'saved-walk-card rounded-xl p-3 mb-2 cursor-pointer border '+(isSelected?'bg-yellow-500/10 border-yellow-500/30':'bg-white/5 border-white/10')}>
                                  <div className="flex items-start justify-between">
                                    <div className="flex-1 min-w-0">
                                      <p className={'text-sm font-medium truncate '+(isSelected?'text-yellow-300':'text-white/80')}>{place.isDogPark?'🐕 ':place.type==='nature_reserve'?'🌲 ':'🌳 '}{place.name}</p>
                                      <p className="text-white/40 text-[10px] mt-0.5">{place.distance} km away · {place.isDogPark?'Dog Park':place.type==='nature_reserve'?'Nature Reserve':place.type==='recreation_ground'?'Recreation Ground':'Park'}</p>
                                    </div>
                                    <div className="flex gap-1 ml-2 flex-shrink-0">
                                      <button onClick={function(e){e.stopPropagation();if(saved){removeWalk(place.id);}else{saveWalk(place);}}} className={'p-1.5 rounded-lg transition-all '+(saved?'bg-yellow-500/20 text-yellow-300':'bg-white/5 text-white/30 hover:text-yellow-300')} title={saved?'Remove from saved':'Save this walk'}>
                                        {saved?'📌':'📍'}
                                      </button>
                                      <a href={'https://www.google.com/maps/dir/?api=1&destination='+place.lat+','+place.lon} target="_blank" rel="noopener noreferrer" onClick={function(e){e.stopPropagation();}} className="p-1.5 rounded-lg bg-white/5 text-white/30 hover:text-yellow-300 transition-all" title="Get directions">
                                        🧭
                                      </a>
                                    </div>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      )}

                      <button onClick={function(){
                        if(walkMapInstance.current){walkMapInstance.current.remove();walkMapInstance.current=null;walkMarkersRef.current=[];}
                        setWalkUserPos(null);setWalkPlaces([]);setWalkSelected(null);setWalkError(null);
                      }} className="btn w-full mt-2 px-3 py-2 rounded-xl text-xs font-medium text-yellow-200">🔄 Search Again</button>
                    </div>
                  )}
                </div>
              )}

              {walkView==='saved' && (
                <div>
                  {savedWalks.length===0 ? (
                    <div className="text-center py-6">
                      <span className="text-4xl mb-2 block">📌</span>
                      <p className="text-white/30 text-sm">No saved walks yet</p>
                      <p className="text-white/20 text-xs mt-1">Find walks on the map and tap 📍 to save them</p>
                    </div>
                  ) : (
                    <div>
                      {savedWalks.map(function(walk){
                        return (
                          <div key={walk.id} className="saved-walk-card rounded-xl p-3 mb-2 bg-white/5 border border-white/10">
                            <div className="flex items-start justify-between">
                              <div className="flex-1 min-w-0">
                                <p className="text-sm font-medium text-white/80 truncate">{walk.isDogPark?'🐕 ':walk.type==='nature_reserve'?'🌲 ':'🌳 '}{walk.name}</p>
                                <p className="text-white/40 text-[10px] mt-0.5">{walk.distance} km · {walk.isDogPark?'Dog Park':walk.type==='nature_reserve'?'Nature Reserve':'Park'}</p>
                              </div>
                              <div className="flex gap-1 ml-2 flex-shrink-0">
                                <a href={'https://www.google.com/maps/dir/?api=1&destination='+walk.lat+','+walk.lon} target="_blank" rel="noopener noreferrer" className="p-1.5 rounded-lg bg-white/5 text-white/30 hover:text-yellow-300 transition-all" title="Get directions">
                                  🧭
                                </a>
                                <button onClick={function(){removeWalk(walk.id);}} className="p-1.5 rounded-lg bg-white/5 text-red-400/50 hover:text-red-400 transition-all" title="Remove">
                                  ✕
                                </button>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              )}
            </div>
          )}

          {/* ═══ FAVORITES PAGE ═══ */}
          {page==='favs' && (
            <div className="glass-card rounded-3xl p-5">
              <div className="text-center mb-4">
                <p className="text-xl font-bold text-white">❤️ My Favorites</p>
              </div>
              <div className="flex gap-2 mb-3">
                <button onClick={function(){setFavTab('pics');}} className={'flex-1 py-1.5 rounded-lg text-xs font-medium transition-all '+(favTab==='pics'?'bg-yellow-500/20 text-yellow-300 border border-yellow-500/40':'bg-white/5 text-white/40 border border-white/10')}>📸 Pictures ({favorites.length})</button>
                <button onClick={function(){setFavTab('gifs');}} className={'flex-1 py-1.5 rounded-lg text-xs font-medium transition-all '+(favTab==='gifs'?'bg-purple-500/20 text-purple-300 border border-purple-500/40':'bg-white/5 text-white/40 border border-white/10')}>🎬 GIFs ({gifFavorites.length})</button>
              </div>
              {favTab==='pics' && (favorites.length===0 ? <p className="text-center text-white/30 text-xs py-4">No favorites yet. Tap the heart on a dog you love!</p> : (
                <div className="grid grid-cols-3 gap-2">{favorites.map(function(fav,i){return <button key={i} onClick={function(){loadFavorite(fav);setPage('home');}} className="relative rounded-lg overflow-hidden aspect-square hover:ring-2 ring-yellow-400 transition-all"><img src={fav.url} alt={fav.breed} className="w-full h-full object-cover"/><span className="absolute bottom-0 left-0 right-0 bg-black/60 text-[8px] text-yellow-200 text-center py-0.5 capitalize truncate px-1">{fav.breed}</span></button>;})}</div>
              ))}
              {favTab==='gifs' && (gifFavorites.length===0 ? <p className="text-center text-white/30 text-xs py-4">No favorite GIFs yet. Watch a pup and tap the heart!</p> : (
                <div className="flex flex-col gap-3">{gifFavorites.map(function(fav,i){return <div key={i} className="relative rounded-xl overflow-hidden"><img src={fav.url} alt="Fav gif" className="w-full rounded-xl" style={{maxHeight:'180px',objectFit:'contain'}}/><button onClick={function(){var u=gifFavorites.filter(function(f){return f.url!==fav.url;});setGifFavorites(u);localStorage.setItem('paws-gif-favs',JSON.stringify(u));}} className="absolute top-2 right-2 p-1 rounded-full bg-black/50 hover:bg-black/70 text-red-400 text-xs">✕</button></div>;})}</div>
              ))}
            </div>
          )}

          <p className="text-center text-white/15 text-[9px] mt-4">Powered by divine intervention & dog.ceo</p>
        </div>
      );
    }

    var root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
